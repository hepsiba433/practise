

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Location Detector with Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    :root {
      --overlay1: rgba(186, 230, 253, 0.7);  /* light blue */
      --overlay2: rgba(224, 242, 254, 0.6);  /* sky blue */
      --card-bg: rgba(255, 255, 255, 0.85);
      --text: #1e293b;
      --subtext: #475569;
      --button-bg: #38bdf8;
      --button-text: #ffffff;
      --button-hover: #0ea5e9;
      --button-hover-text: #ffffff;
      --result-bg: rgba(255, 255, 255, 0.9);
      --border: rgba(0, 0, 0, 0.08);
      --shadow: rgba(0, 0, 0, 0.1);
      --error: #ef4444;
      --success: #10b981;
    }

    body.dark {
      --overlay1: rgba(15, 23, 42, 0.85);
      --overlay2: rgba(30, 41, 59, 0.75);
      --card-bg: rgba(15, 23, 42, 0.75);
      --text: #f1f5f9;
      --subtext: #cbd5f5;
      --button-bg: #0ea5e9;
      --button-text: #fff;
      --button-hover: #0284c7;
      --button-hover-text: #fff;
      --result-bg: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.1);
      --shadow: rgba(0, 0, 0, 0.5);
      --error: #f87171;
      --success: #34d399;
    }

    

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
      transition: 0.4s ease;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("https://images.unsplash.com/photo-1526779259212-939e64788e3c?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat;
      z-index: -2;
      animation: zoomBg 18s ease-in-out infinite alternate;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, var(--overlay1), var(--overlay2));
      z-index: -1;
    }

    @keyframes zoomBg {
      from { transform: scale(1); }
      to { transform: scale(1.08); }
    }

    .container {
      width: 100%;
      max-width: 550px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
      border-radius: 24px;
      padding: 28px;
      color: var(--text);
      box-shadow: 0 10px 35px var(--shadow);
      animation: fadeIn 0.8s ease;
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--subtext);
      user-select: none;
    }

    .toggle input {
      display: none;
    }

    .slider {
      width: 48px;
      height: 24px;
      background: rgba(181, 21, 21, 0.3);
      border-radius: 50px;
      position: relative;
      cursor: pointer;
      transition: 0.3s;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      border-radius: 50%;
      background: white;
      transition: 0.3s;
    }

    .toggle input:checked + .slider::before {
      transform: translateX(24px);
    }

    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 12px;
    }

    .subtitle {
      text-align: center;
      color: var(--subtext);
      margin-bottom: 22px;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    button {
      border: none;
      outline: none;
      padding: 12px 20px;
      border-radius: 30px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s ease;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.18);
    }

    .primary-btn {
      background: var(--button-bg);
      color: var(--button-text);
    }

    .primary-btn:hover {
      background: var(--button-hover);
      color: var(--button-hover-text);
      transform: translateY(-2px) scale(1.03);
    }

    .secondary-btn {
      background: rgba(255, 255, 255, 0.18);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .secondary-btn:hover {
      transform: translateY(-2px) scale(1.03);
      background: rgba(255, 255, 255, 0.28);
    }

    .secondary-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    #result {
      display: none;
      margin-top: 14px;
      padding: 18px;
      background: var(--result-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      animation: slideUp 0.5s ease;
    }

    #result.show {
      display: block;
    }

    .info-card {
      display: grid;
      gap: 12px;
    }

    .row {
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
    }

    .label {
      font-size: 13px;
      opacity: 0.85;
      margin-bottom: 4px;
    }

    .value {
      font-size: 16px;
      font-weight: bold;
      word-break: break-word;
    }

    .success {
      color: var(--success);
    }

    .error {
      color: var(--error);
      font-weight: bold;
    }

    .loading-wrap {
      text-align: center;
      padding: 14px 0;
    }

    .loading {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255, 255, 255, 0.35);
      border-top: 3px solid white;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 12px;
    }

    .map-title {
      margin-top: 18px;
      margin-bottom: 10px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      color: var(--text);
      display: none;
    }

    .map-title.show {
      display: block;
    }

    #map {
      width: 100%;
      height: 300px;
      margin-top: 10px;
      border-radius: 16px;
      overflow: hidden;
      display: none;
      border: 1px solid var(--border);
      animation: fadeIn 0.7s ease;
    }

    #map.show {
      display: block;
    }

    .small-note {
      margin-top: 12px;
      font-size: 12px;
      color: var(--subtext);
      text-align: center;
      line-height: 1.5;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.96);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <label class="toggle">
        <span>Dark Mode</span>
        <input type="checkbox" id="themeToggle" />
        <span class="slider"></span>
      </label>
    </div>

    <h1>Location Detector</h1>
    <p class="subtitle">
      Click the button to detect your current location and show latitude, longitude, city, and map.
    </p>

    <div class="actions">
      <button class="primary-btn" onclick="getLocation()">Get My Location</button>
      <button class="secondary-btn" id="copyBtn" onclick="copyCoordinates()" disabled>
        Copy Coordinates
      </button>
    </div>

    <div id="result"></div>
    <div class="map-title" id="mapTitle">Your Location on Map</div>
    <div id="map"></div>

    <p class="small-note">
      Geolocation works best on <b>HTTPS</b> or <b>localhost</b>.
    </p>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    let currentLatitude = null;
    let currentLongitude = null;
    let map = null;
    let marker = null;

    const result = document.getElementById("result");
    const mapBox = document.getElementById("map");
    const mapTitle = document.getElementById("mapTitle");
    const copyBtn = document.getElementById("copyBtn");
    const themeToggle = document.getElementById("themeToggle");

    themeToggle.addEventListener("change", () => {
      document.body.classList.toggle("dark");
    });

    function showLoading() {
      result.classList.add("show");
      result.innerHTML = `
        <div class="loading-wrap">
          <div class="loading"></div>
          <p>Fetching your location...</p>
        </div>
      `;
      mapBox.classList.remove("show");
      mapTitle.classList.remove("show");
    }

    function showError(message) {
      result.classList.add("show");
      result.innerHTML = `<p class="error">${message}</p>`;
      mapBox.classList.remove("show");
      mapTitle.classList.remove("show");
      copyBtn.disabled = true;
    }

    async function getCity(latitude, longitude) {
      try {
        const response = await fetch(
          `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${latitude}&lon=${longitude}`
        );

        if (!response.ok) {
          throw new Error("City fetch failed");
        }

        const data = await response.json();
        const address = data.address || {};

        return (
          address.city ||
          address.town ||
          address.village ||
          address.hamlet ||
          address.county ||
          "Not found"
        );
      } catch (error) {
        return "Not available";
      }
    }

    function renderMap(latitude, longitude) {
      mapTitle.classList.add("show");
      mapBox.classList.add("show");

      if (!map) {
        map = L.map("map").setView([latitude, longitude], 15);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19,
          attribution: "&copy; OpenStreetMap contributors"
        }).addTo(map);

        marker = L.marker([latitude, longitude]).addTo(map);
      } else {
        map.setView([latitude, longitude], 15);
        marker.setLatLng([latitude, longitude]);
      }

      marker.bindPopup("You are here").openPopup();

      setTimeout(() => {
        map.invalidateSize();
      }, 200);
    }

    async function getLocation() {
      showLoading();

      if (!navigator.geolocation) {
        showError("Geolocation is not supported by this browser.");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        async function(position) {
          const latitude = position.coords.latitude;
          const longitude = position.coords.longitude;

          currentLatitude = latitude;
          currentLongitude = longitude;

          const city = await getCity(latitude, longitude);

          result.innerHTML = `
            <div class="info-card">
              <div class="row">
                <div class="label">Latitude</div>
                <div class="value success">${latitude}</div>
              </div>

              <div class="row">
                <div class="label">Longitude</div>
                <div class="value success">${longitude}</div>
              </div>

              <div class="row">
                <div class="label">City / Area</div>
                <div class="value">${city}</div>
              </div>
            </div>
          `;

          copyBtn.disabled = false;
          renderMap(latitude, longitude);
        },
        function(error) {
          let message = "An unknown error occurred.";

          switch (error.code) {
            case error.PERMISSION_DENIED:
              message = "You denied the request for location access.";
              break;
            case error.POSITION_UNAVAILABLE:
              message = "Location information is unavailable.";
              break;
            case error.TIMEOUT:
              message = "Location request timed out.";
              break;
          }

          showError(message);
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }

    async function copyCoordinates() {
      if (currentLatitude === null || currentLongitude === null) return;

      const text = `Latitude: ${currentLatitude}, Longitude: ${currentLongitude}`;

      try {
        await navigator.clipboard.writeText(text);
        copyBtn.textContent = "Copied!";
        setTimeout(() => {
          copyBtn.textContent = "Copy Coordinates";
        }, 1500);
      } catch (error) {
        copyBtn.textContent = "Copy Failed";
        setTimeout(() => {
          copyBtn.textContent = "Copy Coordinates";
        }, 1500);
      }
    }
  </script>
</body>
</html>
