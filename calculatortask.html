<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #7da7bd, #6aa0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #f2f2f2;
            padding: 25px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            background: #2f6f95;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #255a78;
        }

        #result {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
<body>
   
<div class="container">
    <h2>Bank Loan EMI Calculator</h2>

    <label>Loan Amount (P):</label>
    <input type="number" id="amount" value="1000000">

    <label>Annual Interest Rate (%):</label>
    <input type="number" id="rate" value="9">

    <label>Tenure (months):</label>
    <input type="number" id="months" value="24">

    <button onclick="calculateEMI()">Calculate EMI</button>

    <div id="result">Monthly EMI: </div>
</div>

<script>
    function calculateEMI() {
        let P = document.getElementById("amount").value;
        let annualRate = document.getElementById("rate").value;
        let N = document.getElementById("months").value;

        let R = annualRate / 12 / 100;

        let EMI = (P * R * Math.pow(1 + R, N)) / (Math.pow(1 + R, N) - 1);

        document.getElementById("result").innerHTML =
            "Monthly EMI: " + EMI.toFixed(2);
    }
</script>

<!--EMI=(1+R)N−1P⋅R⋅(1+R)N​-->
 














</body>
</html>
