<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            background-color: white;
            text-align: center;
            font-family: Arial;
        }

        h1 {
            margin-top: 50px;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            cursor: pointer;
            font-size: 20px;
            border-radius: 5px;
        }

        .happy {
            background-color: yellow;
        }

        .sad {
            background-color: blue;
            color: white;
        }

        .angry {
            background-color: red;
            color: white;
        }

        .relaxed {
            background-color: green;
            color: white;
        }

        #message {
            margin-top: 30px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Choose your mood</h1>

    <button class="happy" onclick="setMood('happy')">Happy</button>
    <button class="sad" onclick="setMood('sad')">Sad</button>
    <button class="angry" onclick="setMood('angry')">Angry</button>
    <button class="relaxed" onclick="setMood('relaxed')">Relaxed</button>

    <h2 id="message"></h2>

    <script>
        function setMood(mood) {

            let msg = document.getElementById("message");

            // Clear previous message otherwise you will get Yay! Keep smiling 😊It's okay to feel sad 😢//previous content is not removed right//
            msg.innerHTML = "";

            if (mood === "happy") {
                document.body.style.backgroundColor = "yellow";
                msg.append("Yay! Keep smiling 😊");
            }

            else if (mood === "sad") {
                document.body.style.backgroundColor = "blue";
                msg.append("It's okay to feel sad sometimes.., come back soon 😢");
            }

            else if (mood === "angry") {
                document.body.style.backgroundColor = "red";
                msg.append("Calm down, don't be angry 😡");
            }

            else if (mood === "relaxed") {
                document.body.style.backgroundColor = "green";
                msg.append("Stay calm and relaxed 🧘‍♀️");
            }
        }
    </script>

</body>
</html>
