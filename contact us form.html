<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <title>Contact Form</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            margin: 0;
        }

        .container {
            display: flex;
            padding: 50px;
            background: white;
        }

        .left {
            width: 30%;
            padding: 20px;
            border-left: 2px solid #ddd;
        }

        .right {
            width: 70%;
            padding: 20px 40px;
        }

        .row {
            display: flex;
            gap: 20px;
        }

        input,
        select,
        textarea {
            width: 100%;
            border: none;
            border-bottom: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 20px;
            outline: none;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-bottom: 2px solid red;
        }

        textarea {
            height: 80px;
        }

        /* TERMS */
        .checkbox label {
            display: flex;
            align-items: center;
            font-size: 13px;
            color: #555;
            margin-bottom: 20px;
        }

        .checkbox input {
            width: auto;
            margin-right: 10px;
        }

        /* CAPTCHA FIX */
        .captcha {
            border: 1px solid #ccc;
            padding: 10px;
            width: 230px;
            margin-bottom: 20px;
        }

        .captcha label {
            display: flex;
            align-items: center;
        }

        .captcha input {
            width: auto;
            margin-right: 10px;
        }

        .submit-btn {
            background-color: red;
            color: white;
            padding: 12px 30px;
            border: none;
            cursor: pointer;
        }

        .submit-btn:hover {
            background-color: darkred;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="left">
            <h1>Contact Us</h1>
            <p>Let us know how we can help.</p>
        </div>

        <div class="right">
            <form onsubmit="return validateForm()">

                <div class="row">
                    <input type="text" id="name" placeholder="Name">
                    <input type="email" id="email" placeholder="Your Email Address">
                </div>

                <select id="inquiry">
                    <option value="">Type of Inquiry</option>
                    <option>Support</option>
                    <option>Sales</option>
                </select>

                <input type="text" id="company" placeholder="Company">

                <select id="country">
                    <option value="">Select Country</option>
                    <option>India</option>
                    <option>USA</option>
                </select>

                <textarea id="message" placeholder="Your Message"></textarea>

                <!-- TERMS -->
                <div class="checkbox">
                    <label>
                        <input type="checkbox" id="agree">
                        By submitting this form, I understand that my data will be processed by WNS(Holdings) Ltd. as indicated
                         above and described in the privacy policy."This is a required field."
                    </label>
                </div>

                <!-- CAPTCHA (FIXED SAME LINE) -->
                <div class="captcha">
                    <label>
                        <input type="checkbox" id="robot">
                        I'm not a robot
                    </label>
                </div>

                <button class="submit-btn">SUBMIT</button>

            </form>
        </div>

    </div>

    <script>
        function validateForm() {

            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let inquiry = document.getElementById("inquiry").value;
            let country = document.getElementById("country").value;
            let message = document.getElementById("message").value;
            let agree = document.getElementById("agree").checked;
            let robot = document.getElementById("robot").checked;

            if (name === "") {
                alert("Please enter your name");
                return false;
            }

            if (email === "" || !email.includes("@")) {
                alert("Enter valid email");
                return false;
            }

            if (inquiry === "") {
                alert("Select inquiry type");
                return false;
            }

            if (country === "") {
                alert("Select country");
                return false;
            }

            if (message === "") {
                alert("Enter your message");
                return false;
            }

            if (!agree) {
                alert("Please accept terms");
                return false;
            }

            if (!robot) {
                alert("Please confirm you are not a robot");
                return false;
            }

            alert("Form submitted successfully!");
            return true;
        }
    </script>









</body>

</html>
