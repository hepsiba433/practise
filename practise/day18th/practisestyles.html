<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(to bottom, #f7c6b8, #d4145a);
      text-align: center;
      padding: 40px 20px;
    }

    h1 {
      color: #1d2b53;
      margin-bottom: 10px;
      text-decoration: underline;
    }

    .subtitle {
      color: #7a0026;
      margin-bottom: 40px;
      font-size: 16px;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .card {
      background: rgba(255, 255, 255, 0.3);
      border: 2px solid #333;
      border-radius: 12px;
      width: 280px;
      padding: 25px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.2);
    }

    .card h3 {
      text-decoration: underline;
      margin-bottom: 15px;
    }

    .card h2 {
      margin-bottom: 15px;
      font-size: 20px;
    }

    .card p {
      font-size: 14px;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      background: #d6003f;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #a00030;
    }
  </style>
</head>
    
</html>
